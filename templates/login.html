<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - NEXUS Energy</title>
<style>
:root{
  --bg:#0e1116; --panel:#171c24; --panel2:#1f2630; --line:#2a3340;
  --txt:#e7ecf3; --muted:#9aa6b2; --accent:#3ddc84; --bad:#ef4444;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:radial-gradient(circle at 30% 30%,#1a2332 0,#0e1116 60%);color:var(--txt);
          font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px}
.box{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:18px;
     padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
h1{margin:0 0 4px;font-size:22px;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.sub{color:var(--muted);font-size:13px;margin-bottom:22px}
label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:14px}
input{width:100%;padding:12px 14px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
      border-radius:10px;font-size:15px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--accent)}
button{margin-top:22px;width:100%;padding:14px;background:var(--accent);color:#06140b;border:none;border-radius:12px;
       font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:transform .1s}
button:active{transform:scale(.98)}
.err{margin-top:14px;padding:10px 12px;background:rgba(239,68,68,.12);border:1px solid var(--bad);
     color:var(--bad);border-radius:10px;font-size:13px}
.foot{margin-top:18px;color:var(--muted);font-size:11px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <form class="box" method="post" action="/login">
    <h1>⚡ NEXUS Energy</h1>
    <div class="sub">Bitte einloggen</div>

    {% if error %}<div class="err">⚠ {{ error }}</div>{% endif %}

    <input type="hidden" name="next" value="{{ next or '/' }}"/>

    <label for="u">Benutzer</label>
    <input id="u" name="username" type="text" autocomplete="username"
           autocapitalize="off" autocorrect="off" spellcheck="false" required autofocus/>

    <label for="p">Passwort</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required/>

    <button type="submit">Einloggen →</button>

    <div class="foot">Fronius GEN24 · BYD HVS · Wattpilot · Tibber</div>
  </form>
</div>
</body>
</html>
